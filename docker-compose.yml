version: "3.9"

services:

  fastapi:

    build: .

    container_name: fastapi_auth_app

    ports:
      - "8000:8000"

    volumes:
      - .:/code

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:

    image: postgres:17

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: ashish
      POSTGRES_PASSWORD: root
      POSTGRES_DB: authdb

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:latest

    container_name: redis_server

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  celery:

    build: .

    container_name: celery_worker

    command: celery -A app.tasks worker --pool=solo --loglevel=info

    volumes:
      - .:/code

    depends_on:
      - redis
      - postgres

    env_file:
      - .env

volumes:
  postgres_data:
  redis_data: